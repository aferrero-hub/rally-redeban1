<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindSprint · Redeban × Súmmum</title>
<style>
:root{
  --navy:#04122e;--navy2:#071b45;--teal:#00b89c;--teal2:#00e8c6;
  --accent:#ff5252;--amber:#ffb300;--white:#eef2fb;--muted:#6b7fa3;
  --card:rgba(255,255,255,0.04);--border:rgba(0,184,156,0.18);
  --green:#2ed573;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--white);font-family:'Trebuchet MS',Trebuchet,Arial,sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,184,156,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,184,156,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 20px 110px;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(4,18,46,0.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:12px 20px 12px;border-bottom:1px solid var(--border);margin:0 -20px 26px;box-shadow:0 2px 20px rgba(0,0,0,0.4);}
.hdr-left{display:flex;align-items:center;gap:14px;}
.rb-logo{height:24px;filter:brightness(0) invert(1);opacity:.92;}
.pipe{width:1px;height:20px;background:var(--border);}
.sm-tag{font-size:10px;color:var(--teal);letter-spacing:.12em;text-transform:uppercase;}
.hdr-right{font-size:11px;color:var(--muted);text-align:right;line-height:1.7;}

/* PROGRESS */
.prog-wrap{margin-bottom:22px;}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.prog-pct{font-size:10px;color:var(--teal);}
.prog-track{height:2px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* SCREENS */
.screen{display:none;animation:fadeUp .3s ease;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* CULTURAL BANNER */

.cb-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;}
.cb-icon{font-size:26px;flex-shrink:0;margin-top:2px;}
.cb-content{flex:1;}
.cb-attr{font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;}

.cb-text{font-size:13px;color:#a8c0d8;line-height:1.6;}
.cb-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px;}
.cb-tag{font-size:10px;color:var(--teal);background:rgba(0,184,156,0.1);border:1px solid rgba(0,184,156,0.2);border-radius:20px;padding:3px 12px;}
.cb-btn{background:var(--teal);color:var(--navy);font-family:'Trebuchet MS',sans-serif;font-size:13px;font-weight:700;padding:8px 20px;border:none;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.cb-btn:hover{background:var(--teal2);}
.cb-hint{font-size:10px;color:var(--muted);}

/* RETO CONTENT */

/* REVEAL */
.reveal-box{display:none;margin-top:14px;border-radius:12px;padding:18px 20px;animation:fadeUp .35s ease;}
.reveal-box.show{display:block;}
.reveal-box.correct{background:rgba(46,213,115,0.08);border:1px solid rgba(46,213,115,0.25);}
.reveal-box.wrong{background:rgba(255,82,82,0.07);border:1px solid rgba(255,82,82,0.2);}
.reveal-box.neutral{background:rgba(0,184,156,0.07);border:1px solid rgba(0,184,156,0.2);}
.rv-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.rv-icon{font-size:22px;}
.rv-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.reveal-box.correct .rv-label{color:var(--green);}
.reveal-box.wrong .rv-label{color:var(--accent);}
.reveal-box.neutral .rv-label{color:var(--teal);}
.rv-answer{font-size:15px;font-weight:700;color:var(--white);margin-bottom:6px;}
.rv-insight{font-size:13px;color:#c5d3ee;line-height:1.6;}
.rv-insight em{color:var(--teal);font-style:normal;}

/* TIMEOUT */
.timeout-overlay{display:none;position:fixed;inset:0;background:rgba(4,18,46,.97);z-index:300;align-items:center;justify-content:center;text-align:center;flex-direction:column;}
.timeout-overlay.show{display:flex;animation:fadeUp .3s;}
.to-icon{font-size:52px;margin-bottom:14px;}
.to-title{font-size:28px;font-weight:700;color:var(--accent);margin-bottom:8px;}
.to-sub{font-size:14px;color:var(--muted);}

/* FLASH */
.flash{position:fixed;inset:0;background:rgba(255,82,82,.1);z-index:100;pointer-events:none;opacity:0;transition:opacity .1s;}
.flash.on{opacity:1;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--teal);color:var(--navy);font-size:12px;padding:10px 20px;border-radius:8px;font-weight:700;opacity:0;transition:all .3s;z-index:400;pointer-events:none;max-width:360px;text-align:center;line-height:1.5;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* STEP INDICATOR replaces reto-chip */
.step-indicator{display:flex;align-items:center;gap:4px;margin-bottom:6px;}
.step-dot{width:28px;height:4px;border-radius:2px;background:rgba(255,255,255,0.08);transition:background .3s;}
.step-dot.done{background:var(--teal);}
.step-dot.active{background:var(--teal2);box-shadow:0 0 6px var(--teal2);}
.reto-chip{display:none;}/* hidden — replaced by step indicator */
.reto-hdr{display:flex;gap:14px;align-items:flex-start;margin-bottom:20px;}
.reto-title{font-size:21px;font-weight:700;color:var(--white);line-height:1.2;margin-bottom:5px;}
.reto-sub{font-size:13px;color:var(--muted);}

/* TIMER */
.timer{display:flex;align-items:center;gap:12px;background:rgba(255,82,82,0.07);border:1px solid rgba(255,82,82,0.18);border-radius:10px;padding:11px 16px;margin-bottom:20px;}
.timer-label{font-size:11px;color:var(--muted);flex:1;text-transform:uppercase;letter-spacing:.06em;}
.timer-val{font-size:20px;font-weight:700;color:var(--accent);}
.timer-val.ok{color:var(--amber);}
.timer-val.urgent{animation:blink .4s infinite alternate;}
@keyframes blink{from{opacity:1;}to{opacity:.3;}}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:14px;}
.card-lbl{font-size:10px;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}

/* SCENE */
.scene{background:rgba(0,184,156,0.05);border:1px solid rgba(0,184,156,0.14);border-left:3px solid var(--teal);border-radius:10px;padding:16px 18px;margin-bottom:18px;font-size:14px;line-height:1.75;color:#c5d3ee;}
.scene strong{color:var(--white);font-weight:700;}
.scene em{color:var(--teal);font-style:normal;}

/* EALERT */
.ealert{background:rgba(255,179,0,0.06);border:1px solid rgba(255,179,0,0.18);border-left:3px solid var(--amber);border-radius:10px;padding:16px 18px;margin-bottom:18px;font-size:14px;line-height:1.75;color:#e8d5a0;}
.ea-title{font-size:11px;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}

/* PUZZLE MC */
.pmc-q{margin-bottom:18px;}
.pmc-q-lbl{font-size:11px;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:block;font-weight:700;}
.pmc-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid rgba(255,255,255,0.07);border-radius:9px;margin-bottom:5px;cursor:pointer;transition:all .15s;font-size:13px;color:#c5d3ee;}
.pmc-opt:hover{border-color:rgba(0,184,156,0.35);background:rgba(0,184,156,0.03);}
.pmc-opt.sel{border-color:var(--teal);background:rgba(0,184,156,0.08);color:var(--white);}
.pmc-radio{width:16px;height:16px;flex-shrink:0;border:2px solid rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.pmc-opt.sel .pmc-radio{border-color:var(--teal);background:var(--teal);}
.pmc-opt.sel .pmc-radio
